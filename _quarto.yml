project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "posts/"
website:
  title: "Ian Chen"
  description: "個人網站"
  navbar:
    background: light
    foreground: dark
    pinned: true
    collapse-below: lg
    left:
      - text: "文章列表"
        href: blog.qmd
#      - text: "專案"
#        href: projects.qmd
#      - text: "資料"
#        href: data.qmd
    right:
      - icon: person
        href: about.qmd
  search: false
  page-navigation: true
  
  sidebar:
    - title: "台股動能策略實證"
      style: "docked"
      contents:
        - posts/台股動能策略實證 — 框架設定/index.qmd
        - posts/台股動能策略實證 — 價格動能/index.qmd
        - posts/台股動能策略實證 — 近高點動能/index.qmd

format:
  html:
    theme:
      light: [cosmo, custom.scss]
    css: []
    fig-align: center
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github-light.theme
    link-external-newwindow: true
    include-after-body:
      - scripts/copy-page.html
      - scripts/code-lang-icons.html
      - scripts/code-fold.html
      - scripts/toc-scrollspy.html
      - scripts/finlab-report.html
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
          <script>
            document.addEventListener("DOMContentLoaded", function() {
              let lastScrollTop = 0;
              const navbar = document.querySelector(".navbar");
              
              if (!navbar) return;

              window.addEventListener("scroll", function() {
                let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
                
                if (currentScroll > lastScrollTop && currentScroll > 64) {
                  // Scrolling down & past the header height
                  navbar.classList.add("navbar-hidden");
                } else {
                  // Scrolling up
                  navbar.classList.remove("navbar-hidden");
                }
                lastScrollTop = currentScroll <= 0 ? 0 : currentScroll; // For Mobile or negative scrolling
              }, false);
            });
          </script>

