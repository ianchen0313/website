<script>
// Move category tags from .body into .metadata (after the date)
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.quarto-post').forEach(function(post) {
        var cats = post.querySelector('.body .listing-categories');
        var meta = post.querySelector('.metadata');
        if (cats && meta) {
            // Append after the date link so order is: date -> tag
            meta.appendChild(cats);
            // Ensure the date link comes first visually via flex order
            var dateLink = meta.querySelector('a');
            if (dateLink) dateLink.style.order = '-1';
        }
    });
});

function filterPosts(category, event) {
    // Update active tab (pill highlight)
    document.querySelectorAll('.blog-filter-btn').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // Filter listing items by reading Quarto's data-categories attribute
    // Quarto encodes categories as: base64( encodeURIComponent(category) )
    // So atob() gives us "%E7%B3%BB%E5%88..." which we then decodeURIComponent()
    const items = document.querySelectorAll('.quarto-post');
    items.forEach(item => {
        if (category === 'all') {
            item.style.removeProperty('display');
        } else {
            const encodedCats = item.getAttribute('data-categories') || '';
            let match = false;
            if (encodedCats) {
                try {
                    const decoded = decodeURIComponent(window.atob(encodedCats));
                    match = decoded === category;
                } catch (e) {
                    console.error("Category decode failed:", e);
                }
            }
            if (match) {
                item.style.removeProperty('display');
            } else {
                item.style.setProperty('display', 'none', 'important');
            }
        }
    });
}
</script>

<!-- Load Turndown.js for HTML to Markdown conversion -->
<script src="https://unpkg.com/turndown/dist/turndown.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        // Attempt to locate the main title block and the article content
        const titleBlock = document.querySelector('#title-block-header');
        // Find the main article content container
        const content = document.querySelector('main.content') || document.querySelector('.quarto-document-content') || document.querySelector('main');

        if (titleBlock && content) {
            // Create wrapper so we can position it nicely
            const btnContainer = document.createElement('div');
            btnContainer.className = 'copy-page-wrapper';

            const btn = document.createElement('button');
            btn.id = 'copy-page-btn';
            btn.title = '以 Markdown 格式複製全文';

            const copyIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
            const checkIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

            btn.innerHTML = `
                <span class="icon-container">${copyIcon}</span>
                <span>Copy page</span>
            `;

            btnContainer.appendChild(btn);
            titleBlock.appendChild(btnContainer);

            // Initialize Turndown
            const turndownService = new TurndownService({
                headingStyle: 'atx',      // Uses ### instead of underscores
                codeBlockStyle: 'fenced'  // Uses ``` for code blocks
            });

            btn.addEventListener('click', function (e) {
                e.preventDefault();
                try {
                    // Clone the content so we don't modify the actual page
                    const clone = content.cloneNode(true);

                    // Convert to Markdown
                    const markdown = turndownService.turndown(clone);

                    // Construct the final text: Add the Title to the top
                    const titleElement = titleBlock.querySelector('.title, h1');
                    const titleText = titleElement ? `# ${titleElement.innerText}\n\n` : '';
                    const finalMarkdown = titleText + markdown;

                    // Copy to clipboard
                    navigator.clipboard.writeText(finalMarkdown).then(() => {
                        const iconSpan = btn.querySelector('.icon-container');
                        iconSpan.innerHTML = checkIcon;
                        btn.classList.add('copied');

                        setTimeout(() => {
                            iconSpan.innerHTML = copyIcon;
                            btn.classList.remove('copied');
                        }, 2000);
                    }).catch(err => {
                        console.error('Failed to copy text: ', err);
                    });
                } catch (error) {
                    console.error('Error generating markdown', error);
                }
            });
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const LANG_MAP = {
            python: 'Python',
            sql: 'SQL',
            dockerfile: 'Docker',
            json: 'JSON',
            csv: 'CSV',
            yaml: 'YAML',
            r: 'R',
            cpp: 'C++',
            javascript: 'JavaScript',
            js: 'JavaScript',
            html: 'HTML',
            css: 'CSS',
            bash: 'Bash',
            shell: 'Shell',
            powershell: 'PowerShell'
        };

        const ALIASES = {
            'py': 'python', 'python3': 'python',
            'yml': 'yaml',
            'c++': 'cpp', 'cplusplus': 'cpp',
            'docker': 'dockerfile'
        };

        document.querySelectorAll('div.sourceCode').forEach(function (container) {
            const pre = container.querySelector('pre');
            if (!pre) return;

            let detectedLang = null;
            const classes = Array.from(pre.classList);
            for (const cls of classes) {
                if (cls === 'sourceCode' || cls === 'code-with-copy') continue;
                const key = ALIASES[cls] || cls;
                if (LANG_MAP[key]) { detectedLang = key; break; }
            }
            if (!detectedLang) return;

            const langName = LANG_MAP[detectedLang];

            // Create container
            const wrapper = document.createElement('span');
            wrapper.className = 'code-lang-icon';

            // Text label
            const textSpan = document.createElement('span');
            textSpan.className = 'lang-text';
            textSpan.innerText = langName;

            // Divider
            const divider = document.createElement('span');
            divider.className = 'code-lang-divider';

            wrapper.appendChild(textSpan);
            wrapper.appendChild(divider);
            container.appendChild(wrapper);
        });
    });
</script>

        function setupCodeFold(container) {

            if (container.dataset.codeFoldReady) return;

            const pre = container.querySelector('pre');
            const code = pre ? pre.querySelector('code') : null;
            if (!pre || !code) return;

            const lineSpans = code.querySelectorAll(':scope > span[id]');
            const totalLines = lineSpans.length;
            if (totalLines <= LINE_THRESHOLD) return;

                setupCodeFold(container);
            }

        // Gather all TOC links and their target heading elements
        const tocLinks = Array.from(tocNav.querySelectorAll("a.nav-link"));
        const headingMap = []; // { link, heading, parentLink }

        tocLinks.forEach(function (link) {
            // Extract the hash fragment from the URL (works for both "#id" and "http://.../#id")
            const hash = link.hash;
            if (!hash) return;
            const id = decodeURIComponent(hash.slice(1));
            const heading = document.getElementById(id);
            if (!heading) return;

            let parentLink = null;
            const parentLi = link.closest("ul")?.closest("li");
            if (parentLi) {

                // Only count it as parent if pLink is different from current link
                if (pLink && pLink !== link) {

        const magicLine = document.createElement("div");
        magicLine.className = "toc-magic-line";
        magicLine.style.opacity = "0"; // Hide initially until first scroll
        tocNav.appendChild(magicLine);
        let isLineInitialized = false;

        // Scroll offset to account for fixed navbar
        const SCROLL_OFFSET = 80;

        function updateActive() {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;

            // Find the last heading whose top has scrolled past the viewport top
            let activeEntry = null;
            for (let i = headingMap.length - 1; i >= 0; i--) {
                const rect = headingMap[i].heading.getBoundingClientRect();
                if (rect.top <= SCROLL_OFFSET + 1) {

            // If nothing has scrolled past yet, use the first heading
            if (!activeEntry && headingMap.length > 0) {
                activeEntry = headingMap[0];

            tocLinks.forEach(function (link) {
                link.classList.remove("active");
                link.classList.remove("parent-active");

            if (activeEntry) {
                // Activate the current heading's TOC link
                activeEntry.link.classList.add("active");

                // If h3 is active, mark the parent h2 as parent-active
                if (activeEntry.parentLink) {
                    activeEntry.parentLink.classList.add("parent-active");
                }

                // Move and stretch the Magic Line
                const tocRect = tocNav.getBoundingClientRect();
                const linkRect = activeEntry.link.getBoundingClientRect();
                // offset relative to the TOC container bounds
                const relativeTop = linkRect.top - tocRect.top + tocNav.scrollTop;

                magicLine.style.transform = `translateY(${relativeTop}px)`;
                magicLine.style.height = `${linkRect.height}px`;

                if (!isLineInitialized) {

                isLineInitialized = false;

        const scrollSpyTarget = document.querySelector("[data-bs-spy='scroll']");
        if (scrollSpyTarget) {

            scrollSpyTarget.removeAttribute("data-bs-target");
        }

        let ticking = false;
        window.addEventListener("scroll", function () {
            if (!ticking) {
                requestAnimationFrame(function () {
                    updateActive();
                    ticking = false;
                });
                ticking = true;
            }

        // Also update on resize to ensure Magic Line stays aligned if text wraps differently
        window.addEventListener("resize", function () {
            if (!ticking) {
                requestAnimationFrame(function () {
                    updateActive();
                    ticking = false;
                });
                ticking = true;
            }
        });

        // Add title tooltips for navigation text so hovered items show full text
        // Use a function to apply to elements
        function applyTooltips() {
            const navElements = document.querySelectorAll('.sidebar-item-text, #TOC .nav-link, .nav-page-text');
            navElements.forEach(el => {
                if (!el.hasAttribute('title') && el.textContent.trim()) {

        // Apply immediately
        applyTooltips();

        // Also observe the document for dynamically added elements (Quarto sometimes renders things late)
        const observer = new MutationObserver((mutations) => {
            let shouldApply = false;
            for (let mutation of mutations) {
                if (mutation.addedNodes.length > 0) {
                    shouldApply = true;
                    break;
                }

        });

    });

  FinLab Report Embed — auto-resize + scroll-lock + background sync
  Applies to any <iframe class="finlab-report"> on the page.
  Include via _quarto.yml → include-after-body

<script>
(function () {
  const iframes = document.querySelectorAll('iframe.finlab-report');
  if (!iframes.length) return;

  // Sync iframe element background to match internal page background
  // so the outer frame matches regardless of light/dark mode
  function syncBackground(iframe) {
    try {
      const html = iframe.contentDocument?.documentElement;
      if (!html) return;
      const bg = getComputedStyle(html).backgroundColor;
      if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') {
        iframe.style.backgroundColor = bg;
      }
    } catch (e) { /* cross-origin: skip */ }
  }

  function resizeIframe(iframe) {
    try {
      const body = iframe.contentDocument?.body;
      const html = iframe.contentDocument?.documentElement;
      if (body && html) {
        const height = Math.max(
          body.scrollHeight, body.offsetHeight,
          html.scrollHeight, html.offsetHeight
        );
        if (height > 0) {
          iframe.style.height = height + 'px';
        }
      }
    } catch (e) {
      /* cross-origin: keep CSS min-height */
    }
  }

  function initIframe(iframe) {
    syncBackground(iframe);
    resizeIframe(iframe);
    setInterval(function () {
      syncBackground(iframe);
      resizeIframe(iframe);
    }, 300);
  }

  iframes.forEach(function (iframe) {
    iframe.addEventListener('load', function () {
      initIframe(iframe);
    });

    // If already loaded (e.g. cached)
    if (iframe.contentDocument?.readyState === 'complete') {
      initIframe(iframe);
    }
  });

  // Scroll-lock: prevent parent page jump when iframe steals focus
  window.addEventListener('blur', function () {
    const active = document.activeElement;
    if (active && active.classList.contains('finlab-report')) {
      const scrollY = window.scrollY;
      setTimeout(function () { window.scrollTo(0, scrollY); }, 0);
    }
  });
})();

              // Unselect the line
              unselectCodeLines();
              clickedEl.classList.remove('code-annotation-active');
            }
          });
        }
    const findCites = (el) => {
      const parentEl = el.parentElement;
      if (parentEl) {
        const cites = parentEl.dataset.cites;
        if (cites) {
          return {
            el,
            cites: cites.split(' ')
          };
        } else {
          return findCites(el.parentElement)
        }
      } else {
        return undefined;
      }
    };
    var bibliorefs = window.document.querySelectorAll('a[role="doc-biblioref"]');
    for (var i=0; i<bibliorefs.length; i++) {
      const ref = bibliorefs[i];
      const citeInfo = findCites(ref);
      if (citeInfo) {
        tippyHover(citeInfo.el, function() {
          var popup = window.document.createElement('div');
          citeInfo.cites.forEach(function(cite) {
            var citeDiv = window.document.createElement('div');
            citeDiv.classList.add('hanging-indent');
            citeDiv.classList.add('csl-entry');
            var biblioDiv = window.document.getElementById('ref-' + cite);
            if (biblioDiv) {
              citeDiv.innerHTML = biblioDiv.innerHTML;
            }
            popup.appendChild(citeDiv);
          });
          return popup.innerHTML;
        });
      }
    }
  });
  </script>
</div> <!-- /content -->
